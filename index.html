<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DDPM Landslide Dashboard — Clickable Prototype (Grafana-styled)</title>
<style>
/* ---------- LIGHT (default) ---------- */
:root{
  --bg:#f5f6f8; --bg2:#ffffff; --panel:#ffffff; --panel2:#f1f3f5; --border:#e0e3e8;
  --text:#1b1f24; --muted:#5c636b; --faint:#9aa0a6; --accent:#3866c4; --accentbg:#e7effb;
  --ok:#2E7D32; --warn:#c25e00; --crit:#c62828; --info:#3866c4; --blue:#2f6fd6;
  --tok-normal:#1b5e20; --tok-watch:#8a6100; --tok-warning:#b35400; --tok-danger:#b71c1c;
  --tok-info:#455a64; --tok-sywarn:#7a5c00; --tok-crit:#6a1b9a;
  --green:#2E7D32; --yellow:#F9A825; --orange:#EF6C00; --red:#C62828;
  --shadow:0 1px 2px rgba(0,0,0,.06);
  --radius:4px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Sarabun","Noto Sans Thai",Roboto,Helvetica,Arial,sans-serif;
}
/* ---------- DARK ---------- */
[data-theme="dark"]{
  --bg:#0e1013; --bg2:#141619; --panel:#181b1f; --panel2:#1f2327; --border:#2a2e33;
  --text:#d8d9da; --muted:#8e9297; --faint:#5b5f65; --accent:#3d71d9; --accentbg:#12233f;
  --ok:#3fb950; --warn:#e6c14a; --crit:#ff6b6b; --info:#58a6ff; --blue:#58a6ff;
  --tok-normal:#a7e0a9; --tok-watch:#ffe08a; --tok-warning:#ffc08a; --tok-danger:#ff9a9a;
  --tok-info:#b0bec5; --tok-sywarn:#e6c14a; --tok-crit:#e0a3ee;
  --shadow:none;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.45}
a{color:var(--accent);text-decoration:none}
button{font-family:var(--font)}
.hidden{display:none!important}
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;height:52px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40}
.brandmark{width:26px;height:26px;border-radius:5px;background:linear-gradient(135deg,#e8632a,#f9a825);display:flex;align-items:center;justify-content:center;font-weight:800;color:#111;font-size:12px}
.topbar .title{font-weight:600;font-size:14px}
.topbar .title small{display:block;color:var(--muted);font-weight:400;font-size:11px}
.topbar .spacer{flex:1}
.live{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,150,80,.5)}70%{box-shadow:0 0 0 7px rgba(63,150,80,0)}100%{box-shadow:0 0 0 0 rgba(63,150,80,0)}}
.areasel{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;font-size:13px}
.usermenu{width:30px;height:30px;border-radius:50%;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;font-size:12px}
.shell{flex:1;display:flex;min-height:0}
.nav{width:216px;background:var(--bg2);border-right:1px solid var(--border);padding:8px 0;overflow-y:auto;flex-shrink:0}
.nav .grp{padding:10px 16px 4px;color:var(--faint);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:10px;padding:8px 16px;color:var(--text);cursor:pointer;border-left:2px solid transparent;font-size:13px}
.nav a:hover{background:var(--panel2)}
.nav a.active{background:var(--accentbg);border-left-color:var(--accent);color:var(--accent);font-weight:600}
.nav .ico{width:16px;text-align:center;color:var(--muted);font-size:13px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.content{flex:1;padding:16px;overflow-y:auto}
.annot{display:flex;align-items:center;gap:10px;padding:7px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;color:var(--muted);flex-wrap:wrap}
.annot .tor{color:var(--accent);background:var(--accentbg);border:1px solid var(--border);padding:2px 7px;border-radius:10px}
.feas{padding:2px 7px;border-radius:10px;border:1px solid var(--border)}
.feas.native{color:var(--ok);border-color:var(--ok)}
.feas.alerting{color:var(--warn);border-color:var(--warn)}
.feas.custom{color:var(--orange);border-color:var(--orange)}
.toggle{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.toggle button{background:var(--panel);color:var(--muted);border:0;padding:5px 9px;cursor:pointer;font-size:12px;border-right:1px solid var(--border)}
.toggle button:last-child{border-right:0}
.toggle button.on{background:var(--accent);color:#fff}
.pagehead{display:flex;align-items:baseline;gap:12px;margin:0 0 14px;flex-wrap:wrap}
.pagehead h1{font-size:18px;font-weight:600;margin:0}
.pagehead .sub{color:var(--muted);font-size:12px}
.grid{display:grid;gap:12px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.panel .ph{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);font-weight:600}
.panel .pb{padding:12px}
.kpi .v{font-size:30px;font-weight:700;line-height:1}
.kpi .l{color:var(--muted);font-size:12px;margin-top:4px}
.kpi .v.warn{color:var(--warn)} .kpi .v.crit{color:var(--crit)} .kpi .v.ok{color:var(--ok)}
.areacards{grid-template-columns:repeat(auto-fit,minmax(255px,1fr))}
.areacard{cursor:pointer;transition:border-color .15s}
.areacard:hover{border-color:var(--accent)}
.areacard .pb{display:flex;flex-direction:column;gap:8px}
.arow{display:flex;justify-content:space-between;align-items:center;gap:8px}
.aname{font-weight:600}.aprov{color:var(--muted);font-size:12px}
.mini{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden}
.mini > i{display:block;height:100%;background:var(--ok)}
.tok{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:12px;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid transparent}
.tok .g{font-size:11px}
.tok.normal{color:var(--tok-normal);background:rgba(46,125,50,.14);border-color:var(--green)}
.tok.watch{color:var(--tok-watch);background:rgba(249,168,37,.16);border-color:var(--yellow)}
.tok.warning{color:var(--tok-warning);background:rgba(239,108,0,.14);border-color:var(--orange)}
.tok.danger{color:var(--tok-danger);background:rgba(198,40,40,.14);border-color:var(--red)}
.tok.info{color:var(--tok-info);background:rgba(96,125,139,.14);border-color:#607D8B}
.tok.sywarning{color:var(--tok-sywarn);background:rgba(181,137,0,.14);border-color:#B58900}
.tok.critical{color:var(--tok-crit);background:rgba(142,36,170,.14);border-color:#8E24AA}
.action{color:var(--muted);font-size:11px}
.chip{display:inline-block;padding:1px 7px;border-radius:8px;font-size:11px;border:1px solid var(--border);color:var(--muted)}
.chip.cap{color:var(--crit);border-color:var(--crit)}
.c-ok{color:var(--ok)}.c-warn{color:var(--warn)}.c-crit{color:var(--crit)}.c-info{color:var(--info)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
tr:hover td{background:var(--panel2)}
.status{display:inline-flex;align-items:center;gap:6px}
.sdot{width:8px;height:8px;border-radius:50%}
.sdot.online{background:var(--ok)}.sdot.offline{background:var(--crit)}
.tiles{grid-template-columns:repeat(auto-fill,minmax(212px,1fr))}
.tile .pb{display:flex;flex-direction:column;gap:8px}
.tile .tname{font-weight:600;font-size:13px}
.tile .tid{color:var(--faint);font-size:11px}
.metric{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.metric .mv{font-weight:600}
.bar{height:5px;background:var(--panel2);border-radius:3px;overflow:hidden;flex:1;margin:0 8px}
.bar > i{display:block;height:100%}
.sig{display:inline-flex;gap:2px;align-items:flex-end;height:14px}
.sig > i{width:3px;background:var(--faint);border-radius:1px}
.sig > i.on{background:var(--ok)}
.btn{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:7px 13px;font-size:13px;cursor:pointer}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.sm{padding:4px 9px;font-size:12px}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.seg button{background:var(--panel);color:var(--muted);border:0;padding:6px 12px;cursor:pointer;font-size:13px;border-right:1px solid var(--border)}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--accent);color:#fff}
input,select{background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px}
label.fld{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--muted)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.tabs{display:flex;gap:2px;margin-bottom:12px}
.tabs button{background:var(--panel);color:var(--muted);border:1px solid var(--border);border-bottom:0;border-radius:var(--radius) var(--radius) 0 0;padding:8px 14px;cursor:pointer;font-size:13px}
.tabs button.on{background:var(--panel2);color:var(--text)}
.mailflag{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ok)}
.mailflag.no{color:var(--faint)}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{width:360px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
.login-card h2{margin:6px 0 2px;font-size:18px}
.login-card p.s{color:var(--muted);font-size:12px;margin:0 0 18px}
.login-card label.fld{margin-bottom:12px}
.login-card .btn{width:100%;justify-content:center;text-align:center}
.login-top{display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px}
.badge-native{font-size:10px;color:var(--ok);border:1px solid var(--ok);border-radius:8px;padding:1px 6px;margin-left:8px}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60}
.drawer{position:fixed;top:0;right:0;height:100vh;width:420px;max-width:92vw;background:var(--bg2);border-left:1px solid var(--border);z-index:61;display:flex;flex-direction:column}
.drawer .dh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.drawer .db{padding:16px;overflow-y:auto}
.step{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.step .n{width:24px;height:24px;flex-shrink:0;border-radius:50%;background:var(--accentbg);border:1px solid var(--accent);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.mapwrap{position:relative;background:#0b1a14;border-radius:var(--radius);overflow:hidden}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 0 0;color:var(--muted);font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.note{color:var(--faint);font-size:11px;margin-top:6px}
.wall{position:fixed;inset:0;background:#000;z-index:80;color:#fff;padding:28px;display:flex;flex-direction:column;gap:18px}
.wall h1{font-size:32px;margin:0}
.wall .wtop{display:flex;justify-content:space-between;align-items:center}
.wall .wgrid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:18px}
.wall .wcard{border:2px solid #333;border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:10px;background:#0a0a0a}
.wall .wname{font-size:28px;font-weight:700}
.wall .wtok{font-size:24px;font-weight:800;padding:8px 16px;border-radius:12px;display:inline-flex;align-items:center;gap:12px;align-self:flex-start}
.wall .waction{font-size:19px}
.wall .wstat{display:flex;gap:30px;font-size:20px;color:#ccc}
.wall .wbanner{background:#5a0f0f;border:2px solid #C62828;border-radius:10px;padding:12px 18px;font-size:22px;font-weight:700}
.wall .wclock{font-size:20px;color:#9aa}
@media(max-width:820px){
  .nav{position:fixed;left:0;top:52px;bottom:0;transform:translateX(-100%);transition:transform .2s;z-index:50}
  .nav.open{transform:none}
  .menutoggle{display:inline-flex!important}
  .topbar .title small{display:none}
  .wall .wgrid{grid-template-columns:1fr}
}
.menutoggle{display:none;background:none;border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:5px 9px;cursor:pointer}
</style>

function render(){
  document.documentElement.setAttribute("data-theme",S.theme);
  document.documentElement.lang=S.lang;
  const app=$("#app");
  if(!S.authed){app.innerHTML="";app.appendChild(renderLogin());return;}
  app.innerHTML="";
  app.appendChild(renderTop());
  const shell=el(`<div class="shell"></div>`);
  shell.appendChild(renderNav());
  const main=el(`<div class="main"></div>`);
  const content=el(`<div class="content"></div>`);
  content.appendChild(renderScreen());
  main.appendChild(content);
  main.appendChild(renderAnnot());
  shell.appendChild(main);
  app.appendChild(shell);
  if(S.screen==="wall"&&S.wallOpen){app.appendChild(renderWall());}
}

function langThemeToggles(){

}

function chartPanel(title,times,series,threshold,thNote){
  const W=900,H=300,pad=40;
  const allv=series.flatMap(s=>s.vals).concat(threshold?[threshold]:[]);
  const mx=Math.max(...allv,1);const n=times.length;
  const X=(i)=>pad+i/(n-1)*(W-2*pad);const Y=(v)=>H-pad-(v/mx)*(H-2*pad);
  let svg="";
  [0,.25,.5,.75,1].forEach(f=>{const y=H-pad-f*(H-2*pad);svg+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="var(--border)"/><text x="6" y="${y+4}" fill="var(--faint)" font-size="10">${Math.round(mx*f)}</text>`;});
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
    if(s.area){svg+=`<polygon points="${pad},${H-pad} ${pts} ${W-pad},${H-pad}" fill="${s.color}" fill-opacity=".12"/>`;}
    svg+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="1.8"/>`;
  });
  if(threshold){const y=Y(threshold);svg+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="#C62828" stroke-dasharray="5 4" stroke-width="1.3"/><text x="${W-pad-4}" y="${y-4}" fill="#C62828" font-size="10" text-anchor="end">threshold</text>`;}
  const ticks=[0,Math.floor(n/2),n-1].map(i=>`<text x="${X(i)}" y="${H-pad+16}" fill="var(--faint)" font-size="10" text-anchor="middle">${fmtDT(times[i])}</text>`).join("");
  const leg=series.map(s=>`<span style="color:${s.color}">■</span> ${s.name}`).join(" &nbsp; ");
  return el(`<div class="panel"><div class="ph">${title}<span>${leg}</span></div><div class="pb"><svg viewBox="0 0 ${W} ${H}" width="100%">${svg}${ticks}</svg>${thNote?`<div class="note">${thNote}</div>`:""}</div></div>`);
}

    g.appendChild(el(`<div class="panel tile" style="border-color:${border}"><div class="pb">
      <div class="arow"><div><div class="tname">${nm(d)}</div><div class="tid">${d.id}</div></div><span class="status"><span class="sdot ${d.health.status}"></span></span></div>
      <div class="metric"><span>${L("ออนไลน์","Online")}</span><span class="bar"><i style="width:${d.health.online_rate}%;background:${off?"var(--crit)":"var(--ok)"}"></i></span><span class="mv">${d.health.online_rate}%</span></div>
      <div class="metric"><span>${L("แบตเตอรี่","Battery")}</span><span class="bar"><i style="width:${d.health.battery}%;background:${bc}"></i></span><span class="mv">${d.health.battery}%</span></div>
      <div class="metric"><span>${L("สัญญาณ","Signal")}</span><span style="flex:1"></span>${sigBars(d.health.signal)}<span class="mv" style="margin-left:8px">${d.health.signal}/5</span></div>
      <div class="arow aprov"><span>${powLabel(d.health.power)}</span><span>${ago(d.last_update)}</span></div>
    </div></div>`));
  });
  wrap.appendChild(g);
  return wrap;
}
function powLabel(p){return p==="solar-fault"?L("⚠ โซลาร์ขัดข้อง","⚠ Solar fault"):p==="solar-weak"?L("โซลาร์ต่ำ","Solar low"):L("โซลาร์ปกติ","Solar OK");}

function scrAuto(){
  const wrap=el(`<div></div>`);
  wrap.appendChild(el(`<div class="pagehead"><h1>${L("ตรวจสอบอัตโนมัติ (Automated Monitoring)","Automated Monitoring")}</h1><span class="sub">${L("ตรวจสอบทุกอุปกรณ์ต่อเนื่อง แจ้งเตือนอัตโนมัติ ไม่ต้องมีเจ้าหน้าที่เฝ้าตลอดเวลา","Continuous checks on every device, auto-alerts, no constant staff watching")} (§6.11.1)</span></div>`));
  wrap.appendChild(el(`<div class="row" style="margin-bottom:12px;align-items:center"><span class="live" style="display:inline-flex"><span class="dot"></span>${L("กำลังตรวจสอบอัตโนมัติ · รอบถัดไปใน 30 วินาที","Auto-checking · next cycle in 30s")}</span></div>`));
  const log=el(`<div class="panel" style="margin-bottom:12px"><div class="ph">${L("บันทึกการแจ้งเตือนอัตโนมัติ — หลักฐานว่าระบบทำงานเอง","Auto-alert log — proof the automation fired")}</div>
    <div class="pb" style="padding:0;overflow:auto"><table><thead><tr><th>${L("ประเภทตรวจ","Check")}</th><th>${L("อุปกรณ์/พื้นที่","Device / Area")}</th><th>${L("ผล","Result")}</th><th>${L("ช่องทาง","Channel")}</th><th>${L("เวลา","Time")}</th><th></th></tr></thead><tbody></tbody></table></div></div>`);
  const tb=log.querySelector("tbody");
  DATA.auto_monitor_log.forEach(l=>{
    const res=l.result==="fault"||l.result==="critical"?`<span class="c-crit">${l.result}</span>`:l.result==="warning"?`<span class="c-warn">${l.result}</span>`:`<span class="c-ok">${l.result}</span>`;
    const target=l.device_id||(l.area_id?nm(areaById(l.area_id)):"—");
    const rb=(l.result==="fault")?`<button class="btn sm" data-rb="RB-01">Runbook →</button>`:"";
    const tr=el(`<tr><td>${l.check}</td><td>${target}<div class="aprov">${l.detail}</div></td><td>${res}</td><td><span class="chip">${l.channel}</span></td><td class="aprov">${fmtDT(l.timestamp)}</td><td>${rb}</td></tr>`);
    const b=tr.querySelector("[data-rb]");if(b)b.onclick=()=>openRunbook(b.dataset.rb);
    tb.appendChild(tr);
  });
  wrap.appendChild(log);
  const board=el(`<div class="panel"><div class="ph">${L("กระดานตรวจสอบต่อเนื่อง","Continuous-check board")}<span>${DATA.devices.length} ${L("อุปกรณ์","devices")}</span></div>
    <div class="pb" style="padding:0;max-height:340px;overflow:auto"><table><thead><tr><th>${L("อุปกรณ์","Device")}</th><th>${L("พื้นที่","Area")}</th><th>${L("ผลตรวจล่าสุด","Last check")}</th><th>${L("ตรวจเมื่อ","Checked")}</th></tr></thead><tbody></tbody></table></div></div>`);
  const bb=board.querySelector("tbody");
  DATA.devices.forEach(d=>{
    const r=d.health.status==="offline"?`<span class="c-crit">fault</span>`:(d.health.battery<=20||d.health.signal<=1)?`<span class="c-warn">warning</span>`:`<span class="c-ok">OK</span>`;
    bb.appendChild(el(`<tr><td>${d.id}</td><td>${nm(areaById(d.area_id))}</td><td>${r}</td><td class="aprov">${ago(d.last_update)}</td></tr>`));
  });
  wrap.appendChild(board);
  return wrap;
}

function scrEmail(){
  const wrap=el(`<div></div>`);
  wrap.appendChild(el(`<div class="pagehead"><h1>${L("ตั้งค่าการแจ้งเตือนทางอีเมล","Email Alert Settings")}</h1><span class="sub">${L("ผู้รับ/กลุ่มอีเมลที่ ปภ. กำหนด","DDPM-specified recipients / groups")} (§6.10.5 · §1.7.8)</span></div>`));
  const p=el(`<div class="panel" style="margin-bottom:12px"><div class="ph">${L("ผู้รับอีเมล","Recipients")}<button class="btn sm">+ ${L("เพิ่มผู้รับ","Add recipient")}</button></div>
    <div class="pb" style="padding:0;overflow:auto"><table><thead><tr><th>${L("ชื่อ","Name")}</th><th>${L("อีเมล","Email")}</th><th>${L("ประเภท","Type")}</th></tr></thead><tbody></tbody></table></div></div>`);
  const tb=p.querySelector("tbody");
  DATA.email_recipients.forEach(r=>tb.appendChild(el(`<tr><td>${S.lang==="th"?r.name:(r.name_en||r.name)}</td><td>${r.email}</td><td><span class="chip">${r.type==="group"?L("กลุ่ม","Group"):L("บุคคล","Individual")}</span></td></tr>`)));
  wrap.appendChild(p);
  const routing=el(`<div class="panel" style="margin-bottom:12px"><div class="ph">${L("การกำหนดเส้นทางแจ้งเตือน","Alert routing")}</div><div class="pb">
    <div class="row">
      <label class="fld">${L('เมื่อ "เสี่ยงดินถล่ม ≥ เตือนภัย"','When "landslide-risk ≥ Warning"')}<select><option>${L("กลุ่มแจ้งเตือนดินถล่ม","Landslide Alert Group")}</option></select></label>
      <label class="fld">${L('เมื่อ "ระบบผิดปกติ (Critical)"','When "system-abnormal (Critical)"')}<select><option>${L("ผู้ดูแลระบบ + เจ้าหน้าที่เวร","Admin + Duty Officer")}</option></select></label>
    </div></div></div>`);
  wrap.appendChild(routing);
  const test=el(`<div class="panel"><div class="pb" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <button class="btn primary" id="testbtn">${L("ส่งอีเมลทดสอบ","Send test email")}</button>
    <span id="teststate" class="aprov">${S.mailTest==="sent"?`<span class="mailflag">✓ ${L("ส่งอีเมลทดสอบสำเร็จ — 4 ผู้รับ","Test email sent — 4 recipients")}</span>`:S.mailTest==="sending"?L("กำลังส่ง...","Sending..."):L("เชื่อมต่อกับอีเมล ปภ. แล้ว","Connected to DDPM email")}</span>
    <span class="feas custom" style="margin-left:auto">${L("บน Grafana: contact points (admin) หรือ custom shell","Grafana: contact points (admin) or custom shell")}</span></div></div>`);
  test.querySelector("#testbtn").onclick=()=>{S.mailTest="sending";render();setTimeout(()=>{S.mailTest="sent";render();},700);};
  wrap.appendChild(test);
  return wrap;
}

function scrExport(){
  const wrap=el(`<div></div>`);
  wrap.appendChild(el(`<div class="pagehead"><h1>${L("ส่งออก & ส่งมอบข้อมูล","Export & Data Handover")}</h1><span class="sub">PDF · CAP-XML · Open Standard · Data Retention (§6.10.7-9 · §1.7.4)</span></div>`));
  const grid=el(`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr))"></div>`);
  const alertMsg=L("ต้นแบบ: สร้างรายงาน PDF (report_A4_2026-07-07.pdf) — Grafana OSS ไม่มี PDF ในตัว ต้องใช้ add-on/บริการภายนอก","Prototype: generate PDF (report_A4_2026-07-07.pdf) — Grafana OSS has no native PDF; needs an add-on/external service");
  const pdf=el(`<div class="panel"><div class="ph">${L("ส่งออกรายงาน PDF","PDF report export")} <span class="feas custom">custom</span></div><div class="pb">
    <div class="row"><label class="fld">${L("พื้นที่","Area")}<select>${DATA.areas.map(a=>`<option>${nm(a)}</option>`).join("")}</select></label>
    <label class="fld">${L("วันที่","Date")}<input type="date" value="2026-07-07"></label></div>
    <button class="btn primary" id="pdfbtn" style="margin-top:10px">${L("สร้าง PDF","Generate PDF")} (§1.7.4)</button>
    <div class="note">${L("Grafana OSS ไม่รองรับ PDF ในตัว — ต้องใช้ตัวเสริม/บริการเรนเดอร์ภายนอก","Grafana OSS has no native PDF — needs a plugin/external renderer")}</div></div></div>`);
  pdf.querySelector("#pdfbtn").onclick=()=>alert(alertMsg);
  grid.appendChild(pdf);
  const capAlert=DATA.alerts.find(a=>a.stream==="landslide");
  grid.appendChild(el(`<div class="panel"><div class="ph">${L("ส่งออก CAP-XML (v1.2)","CAP-XML export (v1.2)")} <span class="feas custom">custom</span></div><div class="pb">
    <label class="fld">${L("เลือกการแจ้งเตือน","Select alert")}<select><option>${capAlert.id} — ${L(capAlert.title_th,capAlert.title_en)}</option></select></label>
    <button class="btn primary" style="margin:10px 0" id="capbtn">${L("แสดง/ดาวน์โหลด CAP-XML","Show / download CAP-XML")} (§6.10.7)</button>
    <pre id="cappre" style="display:none;background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-size:11px;overflow:auto;max-height:220px"></pre>
    <div class="note">${L("Grafana Alerting ไม่มี CAP ในตัว — ต้องมี webhook แปลงเป็น CAP-XML","Grafana Alerting has no CAP — needs a webhook to transform to CAP-XML")}</div></div></div>`));
  grid.appendChild(el(`<div class="panel"><div class="ph">${L("ส่งมอบ Open Standard","Open-Standard handover")} <span class="feas native">CSV native</span></div><div class="pb" style="padding:0;overflow:auto">
    <table><thead><tr><th>${L("ชุดข้อมูล","Dataset")}</th><th>${L("รูปแบบ","Format")}</th></tr></thead><tbody>
    ${DATA.exports.filter(e=>["CSV","GeoTIFF","JSON"].includes(e.type)).map(e=>`<tr><td>${e.dataset}</td><td><button class="btn sm">${e.type}${e.type!=="CSV"?" · custom":""}</button></td></tr>`).join("")}
    </tbody></table></div></div>`));
  grid.appendChild(el(`<div class="panel"><div class="ph">${L("นโยบายเก็บข้อมูล & Open Data","Retention & Open Data")} (§6.10.9)</div><div class="pb">
    <label class="fld">${L("ระยะเวลาเก็บข้อมูล (วัน)","Retention period (days)")}<input type="number" value="${DATA.retention.policy_days}"></label>
    <div class="row" style="margin-top:10px;align-items:center"><input type="checkbox"> <span>${L("เผยแพร่เป็น Open Data ภายใต้","Publish as Open Data under")} ${DATA.retention.open_data_license} ${L("(สถาบันวิจัย/มหาวิทยาลัย)","(research/universities)")}</span></div></div></div>`));
  wrap.appendChild(grid);
  const b=wrap.querySelector("#capbtn");
  b.onclick=()=>{const pre=wrap.querySelector("#cappre");pre.style.display="block";pre.textContent=capXML(capAlert);};
  return wrap;
}
function capXML(al){const s=lsev(al.level);return `<?xml version="1.0" encoding="UTF-8"?>
<alert xmlns="urn:oasis:names:tc:emergency:cap:1.2">
  <identifier>${al.id}</identifier>
  <sender>ddpm.landslide@disaster.go.th</sender>
  <sent>${al.timestamp}+07:00</sent>
  <status>Actual</status>
  <msgType>Alert</msgType>
  <scope>Public</scope>
  <info>
    <language>th-TH</language>
    <category>Geo</category>
    <event>Landslide / ดินถล่ม</event>
    <urgency>${al.cap.urgency}</urgency>
    <severity>${al.cap.severity}</severity>
    <certainty>${al.cap.certainty}</certainty>
    <headline>${al.title_th}</headline>
    <description>${al.message_th}</description>
    <instruction>${s.action_th}</instruction>
    <areaDesc>${areaById(al.area_id).name_th}, ${areaById(al.area_id).province}</areaDesc>
  </info>
</alert>`;}

function openRunbook(cid){
  const c=DATA.runbook.find(x=>x.case_id===cid)||DATA.runbook[0];
  const scrim=el(`<div class="scrim"></div>`);
  const steps=S.lang==="th"?c.steps_th:(c.steps_en||c.steps_th);
  const dr=el(`<div class="drawer"><div class="dh"><div><b>Runbook ${c.case_id}</b><div class="aprov">${L(c.title_th,c.title_en)}</div></div><button class="btn sm" id="cl">${L("ปิด","Close")} ✕</button></div>
    <div class="db"><div class="aprov" style="margin-bottom:10px">${L("คู่มือแก้ปัญหาแบบทีละขั้น สำหรับเจ้าหน้าที่ที่ไม่ใช่วิศวกร","Step-by-step guide for non-engineer staff")} (§6.11.3)</div></div></div>`);
  const db=dr.querySelector(".db");
  steps.forEach((s,i)=>db.appendChild(el(`<div class="step"><div class="n">${i+1}</div><div>${s}</div></div>`)));
  const close=()=>{scrim.remove();dr.remove();};
  scrim.onclick=close;dr.querySelector("#cl").onclick=close;
  document.body.appendChild(scrim);document.body.appendChild(dr);
}

function scrWallPlaceholder(){
  const wrap=el(`<div></div>`);
  wrap.appendChild(el(`<div class="pagehead"><h1>${L("จอภาพรวม 75″ (Ops Wall)",'75" Ops Wall')}</h1><span class="sub">4K 3840×2160 · ≥60Hz · ${L("ไม่ต้องมีคนเฝ้า","unattended")} (§1.8) · Grafana kiosk + playlist</span></div>`));
  const p=el(`<div class="panel"><div class="pb"><p>${L("มุมมองเต็มจอสำหรับห้องปฏิบัติการ — อ่านได้ระยะไกล ไม่พึ่ง hover ไม่ต้องโต้ตอบ รีเฟรชอัตโนมัติ","Full-screen ops-room view — glanceable at distance, no hover, no interaction, auto-refresh")}</p>
    <button class="btn primary" id="openwall">${L("เปิดมุมมองจอ 75″ (เต็มจอ)",'Open 75" wall (full screen)')} →</button>
    <div class="note">${L("บน Grafana ใช้ Playlist + Kiosk mode (?kiosk) บนจอ 4K","Grafana: Playlist + Kiosk mode (?kiosk) on a 4K screen")}</div></div></div>`);
  p.querySelector("#openwall").onclick=()=>{S.wallOpen=true;render();};
  wrap.appendChild(p);
  return wrap;
}
function renderWall(){
  const w=el(`<div class="wall"><div class="wtop"><h1>${L("ระบบเฝ้าระวังและเตือนภัยดินถล่ม — ภาพรวม","Landslide Monitoring & Warning — Overview")}</h1><div class="wclock"><span class="dot" style="display:inline-block"></span> LIVE · ${new Date(DATA.meta.now).toLocaleString(loc())}</div></div></div>`);
  const evac=DATA.areas.find(a=>a.risk_level==="danger");
  if(evac)w.appendChild(el(`<div class="wbanner">⬣ ${L("สถานะอพยพ","EVACUATE")} — ${nm(evac)} (${evac.province}) · ${L("อพยพทันที · ส่งอีเมลแล้ว","Evacuate now · email sent")}</div>`));
  const g=el(`<div class="wgrid"></div>`);
  const colors={normal:"#2E7D32",watch:"#F9A825",warning:"#EF6C00",danger:"#C62828"};
  DATA.areas.forEach(a=>{const s=lsev(a.risk_level);const on=onlineCount(a.id),tot=devsOf(a.id).length;
    g.appendChild(el(`<div class="wcard" style="border-color:${colors[a.risk_level]}">
      <div class="wname">${nm(a)} <span style="font-size:18px;color:#888">${a.province}</span></div>
      <div class="wtok" style="background:${colors[a.risk_level]}22;color:${colors[a.risk_level]};border:2px solid ${colors[a.risk_level]}">${SHAPES[a.risk_level]} ${sevText(s)}</div>
      <div class="waction" style="color:${colors[a.risk_level]}">→ ${actText(s)}</div>
      <div class="wstat"><span>${L("อุปกรณ์","Devices")} ${on}/${tot}</span>${a.devices_offline?`<span style="color:#f85149">${L("ออฟไลน์","offline")} ${a.devices_offline}</span>`:`<span style="color:#3fb950">${L("ปกติ","OK")}</span>`}</div>
    </div>`));});
  w.appendChild(g);
  w.appendChild(el(`<div style="text-align:center"><button class="btn" id="exitwall">✕ ${L("ออกจากมุมมองจอ 75″",'Exit 75" wall')}</button></div>`));
  w.querySelector("#exitwall").onclick=()=>{S.wallOpen=false;render();};
  return w;
}

render();
</script>
